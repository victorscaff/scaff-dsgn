name: Compile Sass

on:
  push:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Sass
      run: npm install -g sass
    
    - name: Compile Sass
      run: sass src/scss:assets/css --style compressed
    
    - name: Commit compiled CSS
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add assets/css/
        git commit -m "Auto-compile Sass" || echo "No changes to commit"
        git push
